name: CI

on:
  push:
    branches: [main, development]
  pull_request:

# Serialize runs per ref so two pushes can't deploy into the same dir concurrently.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check:
    name: fmt · lint · check · test
    runs-on: ubuntu-latest

    # Postgres + pgvector for the Corpus integration tests. Pure unit tests run
    # regardless; DB-backed tests activate because DATABASE_URL is set below.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: parallaxfix
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/parallaxfix

    steps:
      - uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Type check
        run: deno check src/main.ts

      - name: Test
        run: deno task test

  # nucklehead is the development environment (private, Tailscale-only — see
  # CLAUDE.md); it tracks `development`, not `main`. `main` is reserved for a
  # future production Droplet deploy, which doesn't exist yet and has no
  # runner, so it intentionally has no deploy job here.
  deploy:
    name: Deploy to nucklehead (development)
    needs: check
    if: github.ref == 'refs/heads/development' && github.event_name == 'push'
    runs-on: self-hosted
    steps:
      - name: Pull latest and restart containers
        run: |
          cd /srv/data-collection/parallax-fix
          git fetch origin
          # Stash any local work (recoverable via `git stash list`) so reset --hard
          # can't silently destroy it; -u keeps the gitignored .env untouched.
          git stash push -u -m "pre-deploy $(date -Iseconds)" || true
          git checkout -B development origin/development
          git reset --hard origin/development
          docker compose up --build -d
